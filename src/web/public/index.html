<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Redis Scanner — Dashboard</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body hx-boost="true">
    <header class="topnav">
      <span class="brand">Redis Scanner</span>
      <nav>
        <a href="/index.html" class="active">Dashboard</a>
        <a href="/results.html">Results</a>
        <a href="/settings.html">Settings</a>
        <a href="/about.html">About</a>
      </nav>
    </header>

    <main>
      <h1>New scan</h1>
      <p class="lead">
        Scan authorized network ranges for Redis-compatible instances. Read-only — no credentials
        are stored.
      </p>

      <div id="error-banner" class="error-banner"></div>

      <form id="scan-form" class="card" method="post" hx-boost="false">
        <h2>Targets</h2>
        <div class="field-row">
          <div class="field" style="flex-basis: 100%">
            <label for="cidrs"
              >CIDR ranges (one per line — leave blank to auto-detect local subnets)</label
            >
            <textarea
              id="cidrs"
              name="cidrs"
              placeholder="10.0.0.0/24&#10;192.168.1.0/24"
            ></textarea>
          </div>
        </div>
        <div class="field-row">
          <div class="field">
            <label for="ports">Ports</label>
            <input type="text" id="ports" name="ports" value="6379" placeholder="6379,6380-6385" />
          </div>
          <div class="field">
            <label for="timeoutMs">Timeout (ms)</label>
            <input type="number" id="timeoutMs" name="timeoutMs" value="1000" min="1" />
          </div>
          <div class="field">
            <label for="concurrency">Concurrency</label>
            <input type="number" id="concurrency" name="concurrency" value="100" min="1" />
          </div>
        </div>
        <div class="field-row">
          <div class="checkbox-field">
            <input type="checkbox" id="tls" name="tls" />
            <label for="tls">Attempt TLS first</label>
          </div>
          <div class="checkbox-field">
            <input type="checkbox" id="tlsSkipVerify" name="tlsSkipVerify" />
            <label for="tlsSkipVerify">Skip certificate verification (self-signed)</label>
          </div>
        </div>

        <h2>Credentials (optional)</h2>
        <div class="field-row">
          <div class="field">
            <label for="username">Username</label>
            <input
              type="text"
              id="username"
              name="username"
              placeholder="ACL user (optional)"
              autocomplete="off"
            />
          </div>
          <div class="field">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" autocomplete="off" />
            <p class="hint">
              Used only for this scan to authenticate and read inventory. Never stored, logged, or
              persisted.
            </p>
          </div>
        </div>

        <div class="actions">
          <button type="submit" id="submit-btn">Start Scan</button>
        </div>
      </form>
    </main>

    <script src="/htmx.min.js"></script>
    <script src="/dashboard.js"></script>
  </body>
</html>
